<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE AI Extension</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="light-theme">
    <div id="app">
        <!-- ヘッダー -->
        <header class="header">
            <h1>AE AI</h1>
            <div class="header-actions">
                <button id="btn-theme" class="btn-icon" title="テーマ切替">
                    <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18">
                        <circle cx="12" cy="12" r="5" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button id="btn-settings" class="btn-icon" title="設定">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- 設定パネル -->
        <div id="settings-panel" class="settings-panel hidden">
            <h3>設定</h3>
            <div class="form-group">
                <label for="ai-provider">AI Provider</label>
                <select id="ai-provider" class="input-select">
                    <option value="claude">Claude (Anthropic)</option>
                    <option value="openai">OpenAI (GPT-4)</option>
                </select>
            </div>
            <div class="settings-actions">
                <button id="btn-save-settings" class="btn-primary">保存</button>
                <button id="btn-cancel-settings" class="btn-secondary">キャンセル</button>
            </div>
        </div>

        <!-- メインコンテンツ -->
        <main class="main-content">
            <!-- 結果表示エリア -->
            <div id="result-area" class="result-area hidden">
                <div class="result-header">
                    <span class="result-label">生成されたコード</span>
                    <button id="btn-copy" class="btn-text" title="コピー">
                        <svg viewBox="0 0 24 24" width="16" height="16">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" fill="none" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                </div>
                <pre id="result-code" class="result-code"></pre>
                <div class="result-actions">
                    <button id="btn-execute" class="btn-primary">
                        <svg viewBox="0 0 24 24" width="16" height="16">
                            <polygon points="5 3 19 12 5 21 5 3" fill="currentColor"/>
                        </svg>
                        実行
                    </button>
                </div>
                <div id="execute-result" class="execute-result hidden"></div>
            </div>

            <!-- キャプチャ結果（小さく表示） -->
            <div id="capture-info" class="capture-info hidden">
                <span class="capture-badge">
                    <svg viewBox="0 0 24 24" width="14" height="14">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <span id="capture-count">0</span>レイヤー選択中
                </span>
                <button id="btn-clear-capture" class="btn-text-small">クリア</button>
            </div>
        </main>

        <!-- 入力エリア（下部固定） -->
        <div class="input-container">
            <div class="input-box">
                <textarea id="ai-prompt" class="input-textarea" placeholder="アニメーションの指示を入力..." rows="1"></textarea>

                <!-- アクションボタン（左側） -->
                <div class="input-actions-left">
                    <button id="btn-capture" class="btn-action" title="レイヤーをキャプチャ">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
                            <polyline points="21 15 16 10 5 21" fill="none" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                    <button id="btn-analyze" class="btn-action" title="レイヤー構造を分析">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <circle cx="11" cy="11" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                </div>

                <!-- 送信ボタン（右側） -->
                <div class="input-actions-right">
                    <span id="connection-status" class="connection-dot" title="API未設定"></span>
                    <button id="btn-generate" class="btn-send" title="生成">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <line x1="12" y1="19" x2="12" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <polyline points="5 12 12 5 19 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="./src/js/CSInterface.js"></script>
    <script src="./src/js/config.js"></script>
    <script src="./src/js/main.js"></script>
</body>
</html>
