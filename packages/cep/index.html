<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE AI Extension</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <h1>AE AI Extension</h1>
            <span id="connection-status" class="status-indicator">接続中...</span>
        </header>

        <main class="main-content">
            <!-- キャプチャセクション -->
            <section class="section">
                <h2>レイヤーキャプチャ</h2>
                <p class="description">選択したレイヤーの構造をキャプチャします</p>
                <button id="btn-capture" class="btn-primary">選択レイヤーをキャプチャ</button>
                <div id="capture-result" class="result-box hidden"></div>
            </section>

            <!-- AI生成セクション -->
            <section class="section">
                <h2>アニメーション生成</h2>
                <textarea id="ai-prompt" class="input-textarea" placeholder="生成したいアニメーションを説明してください..."></textarea>
                <button id="btn-generate" class="btn-primary">AIで生成</button>
                <div id="generate-result" class="result-box hidden"></div>
            </section>

            <!-- 実行セクション -->
            <section class="section">
                <h2>JSX実行</h2>
                <textarea id="jsx-code" class="input-textarea code" placeholder="実行するJSXコードを入力..."></textarea>
                <button id="btn-execute" class="btn-secondary">実行</button>
                <div id="execute-result" class="result-box hidden"></div>
            </section>
        </main>

        <footer class="footer">
            <span id="sync-status">同期: OK</span>
        </footer>
    </div>

    <script src="./src/js/CSInterface.js"></script>
    <script src="./src/js/main.js"></script>
</body>
</html>
